<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bill Management - Online</title>
    <style>
        /* ISTI STIL KAO RANIJE - SKRAĆENO ZBOG DUŽINE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f4f8; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { max-width: 1200px; width: 100%; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        /* ... ostatak stila je isti kao ranije ... */
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Bill Management <span style="font-size:14px; color:#48bb78;">☁️ Online</span></h1>
        <p class="subtitle">Add, view and manage all your bills - saved in the cloud!</p>
        
        <!-- Loading indicator -->
        <div id="loadingIndicator" style="display:none; background:#f7fafc; padding:12px; border-radius:8px; margin-bottom:16px; text-align:center; color:#4299e1;">
            ⏳ Loading data from cloud...
        </div>

        <!-- REST OF THE APP - ISTO KAO RANIJE -->
        <!-- ... -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ---------- SUPABASE CONFIG ----------
        // 🔑 ZAMIJENI OVO SA SVOJIM PODACIMA IZ SUPABASE DASHBOARDA!
        const SUPABASE_URL = 'https://vfghazgxksgpxjhsvblf.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_yM_pn-RlCPJqbPT5jTYSPw_zg14fvNJ';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ---------- DATA LAYER ----------
        let bills = [];
        let isLoading = false;

        // Load from Supabase
        async function loadFromCloud() {
            showLoading(true);
            try {
                const { data, error } = await supabase
                    .from('bills')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                
                if (data && data.length > 0) {
                    bills = data;
                    console.log('Loaded from cloud:', bills.length, 'bills');
                } else {
                    // Seed with demo data if empty
                    const demoBills = [
                        { id: Date.now() + 1, name: 'Electricity', amount: 45.50, date: '01.06.2026', category: 'Utilities', isFixed: true, attachment: null },
                        { id: Date.now() + 2, name: 'Internet', amount: 29.99, date: '15.06.2026', category: 'Internet/Phone', isFixed: true, attachment: null },
                        { id: Date.now() + 3, name: 'Car Repair', amount: 120.00, date: '20.06.2026', category: 'Other', isFixed: false, attachment: null }
                    ];
                    for (const bill of demoBills) {
                        await saveToCloud(bill);
                    }
                    bills = demoBills;
                }
                render();
                updateStats();
            } catch (error) {
                console.error('Error loading from cloud:', error);
                alert('❌ Failed to load data from cloud. Please check your internet connection and Supabase configuration.');
                // Fallback to localStorage
                loadFromLocalStorage();
            }
            showLoading(false);
        }

        // Save to Supabase
        async function saveToCloud(bill) {
            try {
                const { data, error } = await supabase
                    .from('bills')
                    .insert([bill])
                    .select();

                if (error) throw error;
                console.log('Saved to cloud:', bill.name);
                return data;
            } catch (error) {
                console.error('Error saving to cloud:', error);
                alert('❌ Failed to save to cloud. Saving to local storage as backup.');
                saveToLocalStorage(bill);
                return null;
            }
        }

        // Delete from Supabase
        async function deleteFromCloud(id) {
            try {
                const { error } = await supabase
                    .from('bills')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                console.log('Deleted from cloud:', id);
                return true;
            } catch (error) {
                console.error('Error deleting from cloud:', error);
                alert('❌ Failed to delete from cloud.');
                return false;
            }
        }

        // Update in Supabase
        async function updateInCloud(id, updates) {
            try {
                const { error } = await supabase
                    .from('bills')
                    .update(updates)
                    .eq('id', id);

                if (error) throw error;
                console.log('Updated in cloud:', id);
                return true;
            } catch (error) {
                console.error('Error updating in cloud:', error);
                return false;
            }
        }

        // Local storage fallback
        function loadFromLocalStorage() {
            const stored = localStorage.getItem('bills_offline');
            if (stored) {
                try { bills = JSON.parse(stored); } catch (e) { bills = []; }
            }
            render();
            updateStats();
        }

        function saveToLocalStorage(bill) {
            const offline = JSON.parse(localStorage.getItem('bills_offline') || '[]');
            offline.push(bill);
            localStorage.setItem('bills_offline', JSON.stringify(offline));
        }

        function showLoading(show) {
            document.getElementById('loadingIndicator').style.display = show ? 'block' : 'none';
        }

        // ---------- WRAPPER FUNCTIONS ----------
        // Save bill (cloud + local backup)
        async function saveBill(name, amount, date, category, isFixed, attachment) {
            const bill = {
                id: generateId(),
                name,
                amount,
                date,
                category,
                isFixed,
                attachment,
                created_at: new Date().toISOString()
            };

            // Try cloud save
            const result = await saveToCloud(bill);
            if (result) {
                bills.unshift(result[0]); // Add to local array
            } else {
                bills.unshift(bill);
                saveToLocalStorage(bill);
            }
            
            render();
            updateStats();
            document.getElementById('billForm').reset();
            document.getElementById('isFixed').checked = false;
            document.getElementById('fileGroup').style.display = 'block';
            document.getElementById('billFile').value = '';
            document.getElementById('billName').focus();
        }

        // Delete bill
        async function deleteBill(id) {
            if (!isAdmin()) return;
            if (!confirm('Are you sure you want to delete this bill?')) return;

            const success = await deleteFromCloud(id);
            if (success) {
                bills = bills.filter(b => b.id !== id);
                render();
                updateStats();
            }
        }

        // ---------- AUTH LAYER (isti kao ranije) ----------
        const ADMIN_CREDENTIALS = { username: 'admin', password: 'admin123' };
        let isAdminMode = false;

        function loginAdmin(username, password) {
            if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                isAdminMode = true;
                sessionStorage.setItem('adminMode', 'true');
                return true;
            }
            return false;
        }

        function logoutAdmin() {
            isAdminMode = false;
            sessionStorage.removeItem('adminMode');
        }

        function checkAdminSession() {
            const stored = sessionStorage.getItem('adminMode');
            if (stored === 'true') {
                isAdminMode = true;
                return true;
            }
            return false;
        }

        function isAdmin() { return isAdminMode; }

        function generateId() {
            return Date.now() + Math.random() * 1000;
        }

        // ---------- RENDER (isti kao ranije) ----------
        function render() {
            // Isti render kao ranije
            const search = document.getElementById('filterSearch')?.value?.toLowerCase() || '';
            const category = document.getElementById('filterCategory')?.value || '';
            const type = document.getElementById('filterType')?.value || '';

            let filtered = bills.filter(b => {
                const matchName = b.name.toLowerCase().includes(search);
                const matchCat = category ? b.category === category : true;
                const matchType = type ? (type === 'fixed' ? b.isFixed : !b.isFixed) : true;
                return matchName && matchCat && matchType;
            });

            filtered.sort((a, b) => new Date(b.created_at || b.date) - new Date(a.created_at || a.date));

            const tbody = document.getElementById('billTableBody');
            if (!tbody) return;

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="empty">No bills yet. Add your first bill!</td></tr>`;
            } else {
                tbody.innerHTML = filtered.map(b => {
                    const attachmentHtml = b.attachment ?
                        `<a class="attachment-link" data-id="${b.id}">📎 Preview</a>` :
                        '<span style="color:#a0aec0;">None</span>';
                    const deleteBtn = isAdmin() ?
                        `<button class="btn btn-danger btn-sm delete-btn" data-id="${b.id}">🗑️</button>` :
                        `<button class="btn btn-danger btn-sm" disabled style="opacity:0.4; cursor:not-allowed;">🗑️</button>`;
                    return `
                        <tr>
                            <td><strong>${escapeHtml(b.name)}</strong></td>
                            <td>${b.amount.toFixed(2)} BAM</td>
                            <td>${escapeHtml(b.date)}</td>
                            <td>${attachmentHtml}</td>
                            <td><div class="actions">${deleteBtn}</div></td>
                        </tr>
                    `;
                }).join('');
            }

            // Event listeners
            document.querySelectorAll('.attachment-link').forEach(el => {
                el.onclick = function() {
                    const id = parseFloat(this.dataset.id);
                    const bill = bills.find(b => b.id === id);
                    if (bill && bill.attachment) showPreview(bill);
                };
            });

            document.querySelectorAll('.delete-btn').forEach(el => {
                el.onclick = function() {
                    const id = parseFloat(this.dataset.id);
                    deleteBill(id);
                };
            });

            updateStats();
            updateUI();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = bills.length;
            const total = bills.reduce((sum, b) => sum + b.amount, 0);
            document.getElementById('totalAmount').textContent = total.toFixed(2) + ' BAM';
            const fixed = bills.filter(b => b.isFixed).length;
            document.getElementById('fixedCount').textContent = fixed;
            document.getElementById('variableCount').textContent = bills.length - fixed;
        }

        function updateUI() {
            // Isto kao ranije
            const isAdminUser = isAdmin();
            document.getElementById('currentUserDisplay').textContent = isAdminUser ? '👑 Admin (Full Access)' : '👤 User (View Only)';
            document.getElementById('roleBadge').textContent = isAdminUser ? '👑 Admin' : '👤 User';
            document.getElementById('roleBadge').className = `role-badge ${isAdminUser ? 'admin' : 'user'}`;
            document.getElementById('adminLoginBtn').style.display = isAdminUser ? 'none' : 'inline-block';
            document.getElementById('logoutBtn').style.display = isAdminUser ? 'inline-block' : 'none';

            const formSection = document.getElementById('formSection');
            const restrictedMsg = document.getElementById('restrictedMsg');
            const saveBtn = document.getElementById('saveBtn');
            const formInputs = document.querySelectorAll('#billForm input, #billForm select, #billForm .checkbox-group input');

            if (isAdminUser) {
                formSection.classList.remove('disabled');
                restrictedMsg.classList.remove('show');
                saveBtn.disabled = false;
                formInputs.forEach(input => input.disabled = false);
                document.getElementById('billFile').disabled = false;
            } else {
                formSection.classList.add('disabled');
                restrictedMsg.classList.add('show');
                saveBtn.disabled = true;
                formInputs.forEach(input => input.disabled = true);
                document.getElementById('billFile').disabled = true;
            }
        }

        function showPreview(bill) {
            const modal = document.getElementById('previewModal');
            const content = document.getElementById('modalContent');
            const title = document.getElementById('modalTitle');
            title.textContent = `Attachment: ${bill.name}`;
            const data = bill.attachment;
            if (data.type.startsWith('image/')) {
                content.innerHTML = `<img src="${data.data}" alt="Attachment" />`;
            } else if (data.type === 'application/pdf') {
                content.innerHTML = `<iframe src="${data.data}" style="width:100%; height:400px;"></iframe>`;
            } else {
                content.innerHTML = `<p>Unknown file type.</p>`;
            }
            modal.classList.add('active');
        }

        // ---------- EVENT LISTENERS ----------
        document.addEventListener('DOMContentLoaded', function() {
            // Login
            document.getElementById('adminLoginBtn').addEventListener('click', function() {
                document.getElementById('loginOverlay').classList.add('active');
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
            });

            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();
                if (loginAdmin(username, password)) {
                    document.getElementById('loginOverlay').classList.remove('active');
                    document.getElementById('loginError').classList.remove('show');
                    render();
                    updateUI();
                } else {
                    document.getElementById('loginError').classList.add('show');
                    setTimeout(() => document.getElementById('loginError').classList.remove('show'), 3000);
                }
            });

            document.getElementById('logoutBtn').addEventListener('click', function() {
                logoutAdmin();
                render();
                updateUI();
            });

            // Form submit
            document.getElementById('billForm').addEventListener('submit', function(e) {
                e.preventDefault();
                if (!isAdmin()) {
                    alert('Only admins can add bills! Login as Admin first.');
                    return;
                }

                const name = document.getElementById('billName').value.trim();
                const amount = parseFloat(document.getElementById('billAmount').value);
                const date = document.getElementById('billDate').value.trim();
                const category = document.getElementById('billCategory').value;
                const isFixed = document.getElementById('isFixed').checked;
                const fileInput = document.getElementById('billFile');

                if (!name || isNaN(amount) || !date) {
                    alert('Please fill in all required fields (Name, Amount, Date).');
                    return;
                }

                if (!isFixed && fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    if (file.size > 5 * 1024 * 1024) {
                        alert('File is larger than 5MB. Please reduce the size.');
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const attachment = { name: file.name, type: file.type, data: event.target.result };
                        saveBill(name, amount, date, category, isFixed, attachment);
                    };
                    reader.readAsDataURL(file);
                } else {
                    saveBill(name, amount, date, category, isFixed, null);
                }
            });

            // Toggle file input
            document.getElementById('isFixed').addEventListener('change', function() {
                document.getElementById('fileGroup').style.display = this.checked ? 'none' : 'block';
                if (this.checked) document.getElementById('billFile').value = '';
            });

            // Filters
            document.getElementById('filterSearch').addEventListener('input', render);
            document.getElementById('filterCategory').addEventListener('change', render);
            document.getElementById('filterType').addEventListener('change', render);

            document.getElementById('clearFilters').addEventListener('click', function() {
                document.getElementById('filterSearch').value = '';
                document.getElementById('filterCategory').value = '';
                document.getElementById('filterType').value = '';
                render();
            });

            // Modal
            document.getElementById('modalClose').addEventListener('click', () => {
                document.getElementById('previewModal').classList.remove('active');
            });
            document.getElementById('previewModal').addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('active');
            });

            // Check admin session and load data
            if (checkAdminSession()) {
                // Admin already logged in
            }

            // Load from cloud
            loadFromCloud();
        });

        // Minimal HTML needed - skraćeno radi preglednosti
        // U stvarnosti bi trebao imati kompletan HTML sa svim elementima
    </script>
</body>
</html>
